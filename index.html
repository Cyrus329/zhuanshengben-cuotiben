<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#176b6d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="错题本">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>专升本错题本</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./styles.css?v=20260616-m005-nofolder-7">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">专升本备考</p>
        <h1>专升本错题本</h1>
      </div>
      <div class="topbar-actions">
        <button class="icon-button secondary" id="importButton" title="导入备份" aria-label="导入备份">↥</button>
        <button class="icon-button secondary" id="exportButton" title="导出备份" aria-label="导出备份">↧</button>
        <button class="secondary-button" id="cloudSyncButton" type="button">云同步</button>
        <button class="secondary-button" id="installAppButton" type="button">安装到手机</button>
        <button class="primary-button" id="newRecordButton"><span aria-hidden="true">＋</span> 新错题</button>
      </div>
    </header>

    <main class="workspace">
      <section class="stats-grid" aria-label="统计">
        <article class="metric">
          <span>错题总数</span>
          <strong id="totalCount">0</strong>
        </article>
        <article class="metric accent">
          <span>待复习</span>
          <strong id="dueCount">0</strong>
        </article>
        <article class="metric warm">
          <span>本月新增</span>
          <strong id="monthCount">0</strong>
        </article>
        <article class="metric calm">
          <span>已掌握</span>
          <strong id="masteredCount">0</strong>
        </article>
      </section>

      <section class="control-panel" aria-label="整理工具">
        <label class="search-box">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="搜索题目、知识点、标签">
        </label>
        <select id="subjectFilter" aria-label="科目筛选">
          <option value="all">全部科目</option>
        </select>
        <select id="statusFilter" aria-label="状态筛选">
          <option value="active" selected>未掌握题</option>
          <option value="wrong">做错了</option>
          <option value="correct">做对了</option>
          <option value="mastered">已掌握</option>
          <option value="all">全部题</option>
          <option value="new">新记录</option>
          <option value="reviewing">复习中</option>
        </select>
        <select id="tagFilter" aria-label="标签筛选">
          <option value="all">全部标签</option>
        </select>
        <select id="sortSelect" aria-label="排序">
          <option value="newest">最近记录</option>
          <option value="oldest">最早记录</option>
          <option value="due">复习日期</option>
          <option value="difficulty">难度优先</option>
        </select>
        <label class="switch">
          <input id="dueOnlyToggle" type="checkbox">
          <span>只看待复习</span>
        </label>
      </section>

      <section class="subject-strip" id="subjectStrip" aria-label="科目概览"></section>

      <section class="records-layout">
        <div class="records-list" id="recordsList" aria-live="polite"></div>
        <aside class="review-board" aria-label="复习队列">
          <div class="panel-heading">
            <h2>今日复习</h2>
            <button class="text-button" id="clearFiltersButton">清空筛选</button>
          </div>
          <div id="reviewQueue" class="review-queue"></div>
        </aside>
      </section>
    </main>
  </div>

  <dialog class="editor-dialog" id="editorDialog">
    <form id="recordForm" method="dialog" class="editor-form">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">Record</p>
          <h2 id="dialogTitle">新错题</h2>
        </div>
        <button class="icon-button ghost" type="button" id="closeEditorButton" title="关闭" aria-label="关闭">×</button>
      </div>

      <input type="hidden" id="recordId">

      <div class="form-grid">
        <label>
          <span>题目标题</span>
          <input id="titleInput" required maxlength="80" placeholder="例：函数单调性判断">
        </label>
        <label>
          <span>科目</span>
          <select id="subjectInput" required>
            <option value="高数">高数</option>
            <option value="计算机">计算机</option>
            <option value="英语">英语</option>
          </select>
        </label>
        <label>
          <span>章节/知识点</span>
          <input id="chapterInput" maxlength="60" placeholder="导数与函数">
        </label>
        <label>
          <span>来源</span>
          <input id="sourceInput" maxlength="60" placeholder="作业">
        </label>
        <label>
          <span>错题日期</span>
          <input id="wrongAtInput" type="date" required>
        </label>
        <label>
          <span>下次复习</span>
          <input id="nextReviewInput" type="date">
        </label>
        <label>
          <span>状态</span>
          <select id="statusInput">
            <option value="new">新记录</option>
            <option value="wrong">做错了</option>
            <option value="correct">做对了</option>
            <option value="reviewing">复习中</option>
            <option value="mastered">已掌握</option>
          </select>
        </label>
        <label>
          <span>难度</span>
          <select id="difficultyInput">
            <option value="1">简单</option>
            <option value="2" selected>中等</option>
            <option value="3">困难</option>
          </select>
        </label>
      </div>

      <label>
        <span>题目内容</span>
        <textarea id="questionInput" rows="4" placeholder="把题干、条件、关键图形说明写在这里"></textarea>
      </label>
      <div class="split-grid">
        <label>
          <span>我的错误答案</span>
          <textarea id="wrongAnswerInput" rows="3"></textarea>
        </label>
        <label>
          <span>正确答案</span>
          <textarea id="correctAnswerInput" rows="3"></textarea>
        </label>
      </div>
      <label>
        <span>错因</span>
        <textarea id="reasonInput" rows="3" placeholder="审题、公式、计算、概念、步骤等"></textarea>
      </label>
      <label>
        <span>解析/订正</span>
        <textarea id="analysisInput" rows="4"></textarea>
      </label>
      <label>
        <span>标签</span>
        <input id="tagsInput" maxlength="120" placeholder="用逗号分隔，如：粗心, 公式, 二刷">
      </label>

      <div class="image-field">
        <div class="field-label">题图</div>
        <div class="image-actions">
          <label class="upload-button">
            <input id="imageInput" type="file" accept="image/*" multiple>
            <span aria-hidden="true">▧</span> 添加图片
          </label>
          <button class="text-button" type="button" id="clearImagesButton">清空图片</button>
        </div>
        <div class="image-preview" id="imagePreview"></div>
      </div>

      <div class="dialog-actions">
        <button class="danger-button" type="button" id="deleteRecordButton">删除</button>
        <div>
          <button class="secondary-button" type="button" id="cancelEditorButton">取消</button>
          <button class="primary-button" type="submit">保存</button>
        </div>
      </div>
    </form>
  </dialog>

  <dialog class="editor-dialog compact" id="reviewDialog">
    <form id="reviewForm" method="dialog" class="editor-form">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">Review</p>
          <h2 id="reviewTitle">复习记录</h2>
        </div>
        <button class="icon-button ghost" type="button" id="closeReviewButton" title="关闭" aria-label="关闭">×</button>
      </div>
      <input type="hidden" id="reviewRecordId">
      <div class="form-grid two">
        <label>
          <span>复习日期</span>
          <input id="reviewDateInput" type="date" required>
        </label>
        <label>
          <span>结果</span>
          <select id="reviewResultInput">
            <option value="correct">这次答对了</option>
            <option value="wrong">这次又错了</option>
          </select>
        </label>
        <label>
          <span>下次复习</span>
          <input id="reviewNextDateInput" type="date">
        </label>
        <label>
          <span>状态</span>
          <select id="reviewStatusInput">
            <option value="reviewing">复习中</option>
            <option value="wrong">做错了</option>
            <option value="correct">做对了</option>
            <option value="mastered">已掌握</option>
            <option value="new">新记录</option>
          </select>
        </label>
      </div>
      <label>
        <span>复习备注</span>
        <textarea id="reviewNoteInput" rows="3"></textarea>
      </label>
      <div class="dialog-actions">
        <span></span>
        <div>
          <button class="secondary-button" type="button" id="cancelReviewButton">取消</button>
          <button class="primary-button" type="submit">保存复习</button>
        </div>
      </div>
    </form>
  </dialog>

  <dialog class="editor-dialog compact" id="cloudDialog">
    <form id="cloudForm" method="dialog" class="editor-form">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">Cloud</p>
          <h2>云同步</h2>
        </div>
        <button class="icon-button ghost" type="button" id="closeCloudButton" title="关闭" aria-label="关闭">×</button>
      </div>
      <div class="form-grid two">
        <label>
          <span>公开编号</span>
          <input id="cloudSlugInput" maxlength="32" placeholder="例：cyrus329" required>
        </label>
        <label>
          <span>显示名称</span>
          <input id="cloudNameInput" maxlength="32" placeholder="例：Cyrus 的错题进度">
        </label>
        <label>
          <span>编辑密码</span>
          <input id="cloudPinInput" type="password" minlength="4" maxlength="64" placeholder="自己记住，别人不要知道" required>
        </label>
        <label class="switch cloud-public-switch">
          <input id="cloudPublicInput" type="checkbox" checked>
          <span>允许别人通过公开链接查看</span>
        </label>
        <label class="wide-field">
          <span>网页地址</span>
          <input id="shareBaseUrlInput" type="url" placeholder="https://你的用户名.github.io/仓库名/">
        </label>
      </div>
      <p class="cloud-status" id="cloudStatus">第一次使用前，请先在 Supabase 运行 setup 文件。</p>
      <div class="dialog-actions">
        <div>
          <button class="secondary-button" type="button" id="copyPublicLinkButton">复制公开链接</button>
          <button class="secondary-button" type="button" id="copyEditLinkButton">复制协作链接</button>
        </div>
        <div>
          <button class="secondary-button" type="button" id="loadCloudButton">从云端加载</button>
          <button class="secondary-button" type="button" id="cancelCloudButton">取消</button>
          <button class="primary-button" type="submit" id="cloudSubmitButton">保存并开启同步</button>
        </div>
      </div>
    </form>
  </dialog>

  <dialog class="image-viewer-dialog" id="imageViewerDialog">
    <div class="image-viewer-shell">
      <div class="image-viewer-header">
        <h2 id="imageViewerTitle">原题图片</h2>
        <button class="icon-button" id="closeImageViewerButton" type="button" aria-label="关闭大图">×</button>
      </div>
      <div class="image-viewer-stage">
        <img id="imageViewerImage" alt="原题大图">
      </div>
    </div>
  </dialog>

  <input id="importInput" type="file" accept="application/json,.json" hidden>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="./app.js?v=20260616-m005-nofolder-7"></script>
</body>
</html>
